
<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>TravelNest | Feedback</title>
        <link rel="stylesheet" href="css/style.css">
        <link rel="manifest" href="manifest.json">
        <link rel="icon" type="image/x-icon" href="favicon.ico">
        <script defer src="js/feedback.js"></script>
    </head>

    
    <body>
        <nav class="navbar">
            <div class="logo">TravelNest</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="destinations.html">Destinations</a></li>
                <li><a href="budget.html">Budget Planner</a></li>
                <li><a href="generator.html">Trip Generator</a></li>   
                <li><a href="mood.html">Travel Mood</a></li>
                <li><a href="feedback.html">Feedback</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>

        <section class="page-header">
            <h1>Feedback & Support</h1>
            <p>We'd love to hear from you</p>
        </section>

        <section class="feedback-section">
            <div class="feedback-container">
                <div class="feedback-form">
                    <h2 class="section-title">Get in Touch</h2>

                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="feedback-name" placeholder="Your name">
                    </div>

                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="feedback-email" placeholder="your@email.com">
                    </div>

                    <div class="form-group">
                        <label>Subject</label>
                        <select id="feedback-subject">
                            <option value="">Select a subject</option>
                            <option value="general">General Enquiry</option>
                            <option value="suggestion">Suggestion</option>
                            <option value="bug">Report a Bug</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Message</label>
                        <textarea id="feedback-message" rows="5" placeholder="Your message here..."></textarea>
                    </div>

                    <button class="btn" id="feedback-btn">Send Message</button>
                </div>
                
                <div class="feedback-info">
                    <h2 class="section-title">Previous Message</h2>
                    <p class="section-subtitle">Your submitted feedback</p>
                    <div id="feedback-list"></div>
                </div>
            </div>

        </section>

        <footer>
            <nav class="footer-links">
                <a href="index.html">Home</a>
                <a href="destinations.html">Destinations</a>
                <a href="budget.html">Budget</a>
                <a href="generator.html">Generator</a>
                <a href="mood.html">Mood</a>
                <a href="feedback.html">Feedback</a>
            </nav>

            <div class="newsletter">
                <input type="email" id="newsletter-input" placeholder="Enter your email">
                <button id="newsletter-btn">Subscribe</button>
            </div>
            <p>&copy; 2026 TravelNest. All rights reserved.</p>
        </footer>
    </body>
    
    
</html>
